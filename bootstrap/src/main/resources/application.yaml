server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: apartment-management

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/apartment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:apartment-management-secret-key-minimum-256-bits-long}
    expiration: ${JWT_EXPIRATION:86400000}
    issuer: apartment-management
    audience: apartment-management-users

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.apartment.interfaces

logging:
  file:
    name: logs/app.log
  level:
    root: INFO
    com.apartment: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE