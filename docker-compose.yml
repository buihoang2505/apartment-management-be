version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment-postgres
    environment:
      POSTGRES_DB: apartment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: apartment-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/apartment_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-in-production-minimum-256-bits
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: